name: Deploy Production

on:
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production

    steps:
      - name: Ensure workflow runs from master
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/master" ]; then
            echo "This workflow only deploys refs/heads/master."
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: master

      - name: Prepare SSH credentials
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Add VPS host key
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          ssh-keyscan -p "${VPS_PORT:-22}" -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy application
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          DEPLOY_SHA: ${{ github.sha }}
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -p "${VPS_PORT:-22}" \
            -o StrictHostKeyChecking=yes \
            "$VPS_USER@$VPS_HOST" \
            "cd /home/deploy/game-score && DEPLOY_REMOTE=origin DEPLOY_BRANCH=master DEPLOY_REF=$DEPLOY_SHA bash ./deploy/deploy.sh"
